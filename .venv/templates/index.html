<!DOCTYPE html>
<html>
<head>
    <title>IPTV Recorder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2>📡 Stream Scheduler</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Add New Recording</h5>
                <form action="/add" method="post">
                    <label>Select Channel/Fixture:</label>
                    <select name="stream_id" class="form-select mb-2" required>
                        {% for cat, items in data.items() if items is iterable %}
                            <optgroup label="{{ cat.upper() }}">
                            {% for item in items %}
                                <option value="{{ item.channel_id or item.fixture_id }}">
                                    {{ item.channel_name or item.fixture_name }}
                                </option>
                            {% endfor %}
                            </optgroup>
                        {% endfor %}
                    </select>
                    <label>Start Time:</label>
                    <input type="time" name="time" class="form-control mb-2" required>
                    <label>Duration (Hours):</label>
                    <input type="number" step="0.1" name="hours" class="form-control mb-3" placeholder="e.g. 1.5" required>
                    <button type="submit" class="btn btn-primary w-100">Schedule Recording</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <h5>Currently Recording: <span class="badge bg-danger">{{ active|length }}</span></h5>
            <ul class="list-group mb-4">
                {% for name in active %}
                    <li class="list-group-item list-group-item-danger">🔴 Recording: {{ name }}</li>
                {% endfor %}
            </ul>

            <h5>Saved Schedules</h5>
            <table class="table table-striped">
                <thead><tr><th>ID</th><th>Time</th><th>Duration (s)</th></tr></thead>
                <tbody>
                    {% for s in schedules %}
                    <tr><td>{{ s.id }}</td><td>{{ s.time }}</td><td>{{ s.duration }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
