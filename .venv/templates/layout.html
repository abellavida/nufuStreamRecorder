<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVR Pro | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --plex-orange: #e5a00d;
            --plex-dark: #1f2326;
            --plex-black: #121517;
            --text-main: #abb0b3;
            --text-light: #ffffff;
        }
        body { background-color: var(--plex-black); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; font-size: 0.9rem; }
        .navbar { background-color: var(--plex-black); border-bottom: 1px solid #282d32; }
        .navbar-brand { color: var(--plex-orange) !important; font-weight: 800; letter-spacing: 1px; }
        .card { background-color: var(--plex-dark); border: 1px solid #282d32; color: var(--text-main); border-radius: 6px; margin-bottom: 1rem; }
        .card-title { color: var(--text-light); font-weight: 600; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; }
        .btn-primary { background-color: var(--plex-orange); border: none; color: #000; font-weight: 600; }
        .btn-primary:hover { background-color: #cc8e0a; }
        .nav-link { color: var(--text-main); transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--plex-orange); }
        .form-control, .form-select { background-color: #121517 !important; border: 1px solid #333 !important; color: white !important; }
        .form-control:focus { border-color: var(--plex-orange) !important; box-shadow: none; }
        .badge-active { background-color: #e52117; color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .x-small { font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">📺 DVR PRO</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i> Dashboard</a>
                <a class="nav-link" href="/settings"><i class="fas fa-cog me-1"></i> Settings</a>
            </div>
            {% if active %}
            <span class="badge badge-active"><i class="fas fa-record-vinyl me-1"></i> {{ active|length }} Active</span>
            {% endif %}
        </div>
    </nav>
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
